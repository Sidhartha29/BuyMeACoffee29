<html >
<head>
  <title>Creator Social Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
  <style>

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f4f4;
    color: #222;
  }
  
  .banner {
    background-color: #f9e8cc;
    padding: 10px;
    text-align: center;
    font-size: 14px;
  }
  
  .banner button {
    margin-left: 10px;
    background: black;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
  }
  
  .header {
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.05);
  }
  
  .profile {
    display: flex;
    align-items: center;
  }
  
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
  }
  
  .username {
    font-weight: bold;
    font-size: 18px;
  }
  
  .nav-buttons button {
    background: #708bfa;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    margin-right: 10px;
  }
  
  .menu-icon {
    width: 24px;
    height: 24px;
    vertical-align: middle;
  }
  
  .cover {
    height: 100px;
    background-color: #eef0ff;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 30px;
  }
  
  .cover-btn {
    background: white;
    border: 1px solid #ddd;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
  }
  
  .main {
    display: flex;
    gap: 20px;
    padding: 30px;
    flex-wrap: wrap;
  }
  
  .about, .follow-box {
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.05);
  }
  
  .about h3 {
    margin-top: 0;
  }
  
  .edit {
    font-size: 12px;
    float: right;
    cursor: pointer;
    color: #666;
  }
  
  .icon {
    width: 20px;
    height: 20px;
    margin-top: 5px;
  }
  
  .follow-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
  }
  
  .follow-btn {
    width: 100%;
    background-color: #7d95fc;
    border: none;
    padding: 10px;
    border-radius: 25px;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
  
  .highlight {
    color: #7d95fc;
  }
  
  .music-feed {
    padding: 30px;
    background: #fff;
    margin: 20px;
    border-radius: 20px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.05);
  }
  
  footer {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    font-size: 14px;
    background: #f9f9f9;
  }
  
  footer a {
    color: #555;
    text-decoration: none;
  }
  
  footer a:hover {
    text-decoration: underline;
  }
</style>
<body>
  <!-- Top Banner -->
  <div class="banner">Please link your socials to start sharing content. <button>Complete setup</button></div>

  <!-- Header -->
  <header class="header">
    <div class="profile">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-zTaf7DiAioPFY_SwVjnz47M7OEpaGonIuw&s" alt="Avatar" class="avatar" />
      <span class="username">Sidhartha Kalva</span>
    </div>
    <nav class="nav-buttons">
      <button>+ Create</button>
      <img src="menu-icon.png" class="menu-icon" />
    </nav>
  </header>

  <!-- Cover Image Section -->
  <section class="cover">
    <button class="cover-btn">Add cover image</button>
  </section>

  <!-- Main Content -->
  <main class="main">

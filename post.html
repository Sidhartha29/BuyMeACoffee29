    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      color: #333;
    }
    .banner {
      background-color:  #FFDD00;
      color: #000;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .banner img {
      height: 30px;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      color: #444;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #ffdd00;
      border: none;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #f0c800;
    }
  </style>

  <div class="container">
    <h2>Create a New Post</h2>
    <form>
      <label for="type">Post Type</label>
      <select id="type">
        <option value="review">🎬 Movie Review</option>
        <option value="song">🎵 Song Share</option>
        <option value="text">📝 Text Post</option>
      </select>

      <label for="title">Title</label>
      <input type="text" id="title" placeholder="e.g. Oppenheimer Review or New Song Release" />

      <label for="content">Content</label>
      <textarea id="content" rows="5" placeholder="Write your post here..."></textarea>

      <label for="media">Media URL (optional)</label>
      <input type="text" id="media" placeholder="e.g. https://example.com/audio.mp3 or image URL" />

      <button type="submit">Post</button>
    </form>
  </div>
